<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" (click)="roster()" style="cursor: pointer">
      <img
        src="assets/World_Baseball_Classic_logo.svg.png"

        style="height: auto"
        alt="World Baseball Classic Logo"
      />
    </a>
    <button

      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarSupportedContent"

      aria-label="Toggle navigation"

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-5">

          <a
            class="nav-link"
            aria-current="page"
            [routerLink]="['/roster']"
            routerLinkActive="active"
            >Roster</a
          >

        <li class="nav-item">
          <a class="nav-link" [routerLink]="['/entry']" routerLinkActive="active">Line-up</a>
        </li>
      </ul>

        <input
          class="form-control me-2"
          type="search"
          placeholder="Search"
          aria-label="Search"
          [formControl]="searchText"
        />
        <button class="btn btn-outline-success" type="button" (click)="onSearch()">Search</button>
      </form>
